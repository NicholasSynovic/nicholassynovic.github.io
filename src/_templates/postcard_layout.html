{% for post in posts %}
<div class="sd-card sd-sphinx-override sd-mb-3 sd-shadow-sm">
    <div class="sd-card-body">
        <div class="sd-card-title sd-font-weight-bold">
            <a href="{{ pathto(post.docname) }}">{{ post.title }}</a>
        </div>
        <div class="sd-card-text">
            <small class="text-muted">{{ post.date.strftime('%B %d, %Y')
                }}</small>
            <p>{{ post.excerpt[0] if post.excerpt else "" }}</p>
        </div>
    </div>
    <div class="sd-card-footer">
        {% for tag in post.tags %}
        <span class="sd-badge sd-bg-primary sd-bg-text-primary">{{ tag
            }}</span>
        {% endfor %}
    </div>
</div>
{% endfor %}
